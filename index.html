<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Media Monitor</title>
  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>Media Monitor</h1>
        <p id="userLabel">Кабінет моніторингу</p>
      </div>
      <button class="icon-button" id="closeButton" type="button" aria-label="Закрити">×</button>
    </header>

    <section class="panel">
      <h2>Ключові слова</h2>
      <div class="field-row">
        <input id="keywordInput" type="text" autocomplete="off" placeholder="Ключове слово або фраза">
        <button id="addKeywordButton" type="button">Додати</button>
      </div>
      <div class="field-row">
        <input id="removeKeywordInput" type="text" autocomplete="off" placeholder="Ключ для видалення">
        <button class="secondary" id="removeKeywordButton" type="button">Видалити</button>
      </div>
    </section>

    <section class="panel">
      <h2>Режим пошуку</h2>
      <div class="segmented">
        <button id="fulltextOnButton" type="button">Повний текст</button>
        <button id="fulltextOffButton" type="button">RSS-анонс</button>
      </div>
    </section>

    <section class="panel">
      <h2>TG-пакети</h2>
      <div class="blocks">
        <button data-block="1" data-enabled="false" type="button">Вимкнути 1-50</button>
        <button data-block="1" data-enabled="true" type="button">Увімкнути 1-50</button>
        <button data-block="2" data-enabled="false" type="button">Вимкнути 51-100</button>
        <button data-block="2" data-enabled="true" type="button">Увімкнути 51-100</button>
        <button data-block="3" data-enabled="false" type="button">Вимкнути 101-150</button>
        <button data-block="3" data-enabled="true" type="button">Увімкнути 101-150</button>
        <button data-block="4" data-enabled="false" type="button">Вимкнути 151-200</button>
        <button data-block="4" data-enabled="true" type="button">Увімкнути 151-200</button>
        <button data-block="5" data-enabled="false" type="button">Вимкнути 201-230</button>
        <button data-block="5" data-enabled="true" type="button">Увімкнути 201-230</button>
      </div>
    </section>

    <section class="panel commands">
      <button id="sourcesFileButton" type="button">Отримати файл джерел</button>
      <button id="checkButton" type="button">Перевірити зараз</button>
      <button id="plansButton" type="button">Тарифи</button>
    </section>

    <p class="status" id="statusText">Дія буде виконана ботом у чаті.</p>
  </main>
  <script src="./app.js"></script>
</body>
</html>
